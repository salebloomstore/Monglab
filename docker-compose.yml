        echo 'WAITING FOR KEYFILE...'
        while [ ! -f /etc/mongo-keyfile ]; do sleep 2; done
        echo 'KEYFILE CREATED'

        mkdir -p /data/db

        echo 'STARTING UP NODE IN PROGRESS WITH NO AUTH'
        mongod --replSet fujimoRS --bind_ip_all --port 27017 --dbpath /data/db --fork --logpath /tmp/mongod.log --shardsvr
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH NO AUTH'

        echo 'WAITING FOR STARTING UP SHARDE-FUJIMO-HN IN PROGRESS WITH AUTH'
        while [ ! -f /pitfall/restart-sharde-fujimo-hn-done ]; do sleep 2; done
        echo 'THE SHARDE-FUJIMO-HN HAVE FINISHED BOOTING UP WITH AUTH'
        rm -f /pitfall/restart-sharde-fujimo-dn-done
        rm -f /pitfall/restart-sharde-fujimo-hn-done

        echo 'WAITING FOR STARTING UP NODE IN PROGRESS WITH AUTH'
        mongod --shutdown --dbpath /data/db
        while pgrep mongod >/dev/null; do sleep 2; done
        mongod --replSet fujimoRS --bind_ip_all --port 27017 --dbpath /data/db --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --fork --logpath /tmp/mongod.log --shardsvr
        touch /pitfall/restart-sharde-fujimo-sg-done
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH AUTH'

        tail -f /tmp/mongod.log
      "

  # ============================================================================================
  # CONFIG MONGOS ROUTER
  # ============================================================================================

  # =====================================================
  # MONGO ROUTER DN (Cluster bootstrap router)
  # =====================================================
  mongos-router-dn:
    container_name: ${APP_NAME}_mongos-router-dn
    image: *mongo-image
    volumes:
      - ./keyfile:/etc
      - ./mongo/cluster.js:/mongo/cluster.js:ro
      - ./pitfall:/pitfall
    env_file: .env
    ports:
      - ${MONGOS_ROUTER_DN_PORT}:27017
    networks:
      - master-netwrk
    command: |
      bash -c "
        set -e

        echo 'WAITING FOR KEYFILE...'
        while [ ! -f /etc/mongo-keyfile ]; do sleep 2; done
        echo 'KEYFILE CREATED'

        echo 'WAITING FOR STARTING UP SHARDE-MATTER-SG IN PROGRESS WITH AUTH'
        while [ ! -f /pitfall/restart-sharde-matter-sg-done ]; do sleep 2; done
        echo 'THE SHARDE-MATTER-SG HAVE FINISHED BOOTING UP WITH AUTH'

        echo 'CONFIGURATING CONFIG SERVER FOR MONGOS-ROUTER-DN'
        mongos --configdb matterRS/sharde-matter-dn:27017,sharde-matter-hn:27017,sharde-matter-sg:27017 --bind_ip_all --keyFile /etc/mongo-keyfile --fork --logpath /tmp/mongos.log
        until mongosh --quiet --host mongos-router-dn --port 27017 -u ${MONGO_ADMINIST_SHARDE_MATTER} -p ${MONGO_PASSWORD_SHARDE_MATTER} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do sleep 2; done
        echo 'CONFIG-SERVER-DN FOR MONGOS-ROUTER-DN CONFIGURATION COMPLETED'

        echo 'WAITING FOR STARTING UP SHARDE-EVERES-SG IN PROGRESS WITH AUTH'
        while [ ! -f /pitfall/restart-sharde-everes-sg-done ]; do sleep 2; done
        echo 'THE SHARDE-EVERES-SG HAVE FINISHED BOOTING UP WITH AUTH'

        echo 'WAITING FOR STARTING UP SHARDE-FANSIP-SG IN PROGRESS WITH AUTH'
        while [ ! -f /pitfall/restart-sharde-fansip-sg-done ]; do sleep 2; done
        echo 'THE SHARDE-FANSIP-SG HAVE FINISHED BOOTING UP WITH AUTH'

        echo 'WAITING FOR STARTING UP SHARDE-FUJIMO-SG IN PROGRESS WITH AUTH'
        while [ ! -f /pitfall/restart-sharde-fujimo-sg-done ]; do sleep 2; done
        echo 'THE SHARDE-FUJIMO-SG HAVE FINISHED BOOTING UP WITH AUTH'

        echo 'WAITING FOR STARTING UP MONGOS-ROUTER-DN IN PROGRESS WITH AUTH'
        mongosh --host mongos-router-dn --port 27017 -u ${MONGO_ADMINIST_SHARDE_MATTER} -p ${MONGO_PASSWORD_SHARDE_MATTER} --authenticationDatabase admin /mongo/cluster.js

        echo 'WAITING FOR STARTING UP MONGOS-ROUTER-HN IN PROGRESS'
        while [ ! -f /pitfall/mongos-router-hn-ready ]; do sleep 2; done
        echo 'THE MONGOS-ROUTER-HN HAVE FINISHED BOOTING UP'

        echo 'WAITING FOR STARTING UP MONGOS-ROUTER-SG IN PROGRESS WITH AUTH'
        while [ ! -f /pitfall/mongos-router-sg-ready ]; do sleep 2; done
        echo 'THE MONGOS-ROUTER-SG HAVE FINISHED BOOTING UP WITH AUTH'

        rm -f /pitfall/restart-sharde-matter-sg-done
        rm -f /pitfall/restart-sharde-everes-sg-done
        rm -f /pitfall/restart-sharde-fansip-sg-done
        rm -f /pitfall/restart-sharde-fujimo-sg-done
        rm -f /pitfall/mongos-router-hn-ready
        rm -f /pitfall/mongos-router-sg-ready

        tail -f /tmp/mongos.log
      "

  # =====================================================
