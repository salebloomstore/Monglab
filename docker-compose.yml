# =====================================================
# DOCKER COMPOSE - MONGODB SHARDED CLUSTER
# =====================================================
# Components:
# - Config Server Replica Set: matterRS
# - Shard Replica Sets: everesRS / fansipRS / fujimoRS
# - Mongos Routers: mongos-router-dn / mongos-router-hn / mongos-router-sg
# - Mongo Express UI: mongos-expres-io
# =====================================================

name: mongos-master

x-mongo-image: &mongo-image mongo:7.0.14@sha256:0032d2ca20db5fa34926f196c8a43b74e34ed239a7f2453ff1505b6f12ba8ea6
x-mongo-express-image: &mongo-express-image mongo-express:1.0.2@sha256:1b23d7976f0210dbec74045c209e52fbb26d29b2e873d6c6fa3d3f0ae32c2a64

networks:
  master-netwrk:
    external: true

services:
  # =====================================================
  # KEYFILE GENERATOR (used for MongoDB auth replication)
  # =====================================================
  keygen:
    container_name: ${APP_NAME}_keygen-suicid-cr
    image: *mongo-image
    volumes:
      - ./keyfile:/keyfile
      - ./keygen:/keygen
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["bash", "/keygen/create-keyfile.sh"]
    networks:
      - master-netwrk

  # ============================================================================================
  # CONFIG SERVER REPLICA SET: matterRS (SHARDE MATTER)
  # ============================================================================================

  # =====================================================
  # SHARDE MATTER DN (Primary bootstrap node for cluster init)
  # =====================================================
  sharde-matter-dn:
    container_name: ${APP_NAME}_sharde-matter-dn
    image: *mongo-image
    volumes:
      - ./keyfile:/etc
      - sharde-matter-dn-da:/data/db
      - sharde-matter-dn-cf:/data/configdb
      - ./init/init-sharde-matter.js:/init/init-sharde-matter.js:ro
    env_file: .env
    ports:
      - ${SHARDE_MATTER_DN_PORT}:${PORT_OF_MONGOS}
    networks:
      - master-netwrk
    command: |
      bash -c "
        set -e

        echo 'WAITING FOR KEYFILE...'
        while [ ! -f /etc/mongo-keyfile ]; do sleep 2; done
        echo 'KEYFILE CREATED'

        mkdir -p /data/db

        echo 'STARTING UP NODE IN PROGRESS WITH NO AUTH'
        mongod --replSet matterRS --bind_ip_all --port ${PORT_OF_MONGOS} --dbpath /data/db --fork --logpath /tmp/mongod.log --configsvr
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH NO AUTH'

        echo 'WAITING FOR SHARDE-MATTER-HN'
        until mongosh --quiet --host ${SHARDE_MATTER_HN_ADRS}:${PORT_OF_MONGOS} --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do sleep 2; done
        echo 'SHARDE-MATTER-HN READY'

        echo 'WAITING FOR SHARDE-MATTER-SG'
        until mongosh --quiet --host ${SHARDE_MATTER_SG_ADRS}:${PORT_OF_MONGOS} --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do sleep 2; done
        echo 'SHARDE-MATTER-SG READY'

        echo 'WAITING SHARDE-MATTER-DN FOR INIT'
        mongosh --host ${SHARDE_MATTER_DN_ADRS}:${PORT_OF_MONGOS} /init/init-sharde-matter.js
        echo 'SHARDE-MATTER-DN INIT DONE'

        echo 'WAITING FOR STARTING UP NODE IN PROGRESS WITH AUTH'
        mongod --shutdown --dbpath /data/db
        while pgrep mongod >/dev/null; do sleep 2; done
        mongod --replSet matterRS --bind_ip_all --port ${PORT_OF_MONGOS} --dbpath /data/db --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --fork --logpath /tmp/mongod.log --configsvr
        until mongosh --quiet --host ${SHARDE_MATTER_DN_ADRS}:${PORT_OF_MONGOS} --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do sleep 2; done
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH AUTH'

        tail -f /tmp/mongod.log
      "

  # =====================================================
  # SHARDE MATTER HN (Replica set member)
  # =====================================================
  sharde-matter-hn:
    container_name: ${APP_NAME}_sharde-matter-hn
    image: *mongo-image
    volumes:
      - ./keyfile:/etc
      - sharde-matter-hn-da:/data/db
      - sharde-matter-hn-cf:/data/configdb
    env_file: .env
    ports:
      - ${SHARDE_MATTER_HN_PORT}:${PORT_OF_MONGOS}
    networks:
      - master-netwrk
    command: |
      bash -c "
        set -e

        echo 'WAITING FOR KEYFILE...'
        while [ ! -f /etc/mongo-keyfile ]; do sleep 2; done
        echo 'KEYFILE CREATED'

        mkdir -p /data/db

        echo 'STARTING UP NODE IN PROGRESS WITH NO AUTH'
        mongod --replSet matterRS --bind_ip_all --port ${PORT_OF_MONGOS} --dbpath /data/db --fork --logpath /tmp/mongod.log --configsvr
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH NO AUTH'

        echo 'WAITING FOR STARTING UP SHARDE-MATTER-DN IN PROGRESS WITH AUTH'
        until mongosh --quiet --host ${SHARDE_MATTER_DN_ADRS}:${PORT_OF_MONGOS} -u ${MONGO_ADMINIST_SHARDE_MATTER} -p ${MONGO_PASSWORD_SHARDE_MATTER} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do sleep 2; done
        echo 'THE SHARDE-MATTER-DN HAVE FINISHED BOOTING UP WITH AUTH'

        echo 'WAITING FOR STARTING UP NODE IN PROGRESS WITH AUTH'
        mongod --shutdown --dbpath /data/db
        while pgrep mongod >/dev/null; do sleep 2; done
        mongod --replSet matterRS --bind_ip_all --port ${PORT_OF_MONGOS} --dbpath /data/db --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --fork --logpath /tmp/mongod.log --configsvr
        until mongosh --quiet --host ${SHARDE_MATTER_HN_ADRS}:${PORT_OF_MONGOS} --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do sleep 2; done
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH AUTH'

        tail -f /tmp/mongod.log
      "

