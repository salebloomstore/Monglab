  mongos-router-dn:
    container_name: ${APP_NAME}_mongos-router-dn
    image: *mongo-image
    volumes:
      - ./keyfile:/etc
      - ./mongo/cluster.js:/mongo/cluster.js:ro
      - ./pitfall:/pitfall
    env_file: .env
    ports:
      - ${MONGOS_ROUTER_DN_PORT}:27017
    networks:
      - master-netwrk
    command: |
      bash -c "
        set -e

        echo 'WAITING FOR KEYFILE...'
        while [ ! -f /etc/mongo-keyfile ]; do sleep 2; done
        echo 'KEYFILE CREATED'

        echo 'WAITING FOR STARTING UP SHARDE-MATTER-DN IN PROGRESS WITH AUTH'
        while [ ! -f /pitfall/restart-sharde-matter-dn-done ]; do sleep 2; done
        echo 'THE SHARDE-MATTER-DN HAVE FINISHED BOOTING UP WITH AUTH'

        echo 'WAITING FOR STARTING UP SHARDE-MATTER-HN IN PROGRESS WITH AUTH'
