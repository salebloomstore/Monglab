  # ============================================================================================
  # MONGO EXPRESS UI
  # ============================================================================================
  mongos-expres-io:
    container_name: ${APP_NAME}_mongos-expres-io
    image: *mongo-express-image
    depends_on:
      - mongos-router-dn
      - mongos-router-hn
      - mongos-router-sg
    env_file: .env
    ports:
      - ${MONGOS_EXPRES_IO_PORT}:8081
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ADMINIST_SHARDE_MATTER}:${MONGO_PASSWORD_SHARDE_MATTER}@mongos-router-dn:27017,mongos-router-hn:27017,mongos-router-sg:27017/admin?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${EXPRESS_ADMIN}
      ME_CONFIG_BASICAUTH_PASSWORD: ${EXPRESS_PASSWORD}
    command: |
      bash -c "
      echo 'Waiting for mongos startup...'
      until nc -z mongos-router-dn 27017; do sleep 2; done
      until nc -z mongos-router-hn 27017; do sleep 2; done
      until nc -z mongos-router-sg 27017; do sleep 2; done
      echo 'mongos is ready'
      /sbin/tini -- node app
      "
    networks:
      - master-netwrk

