# =====================================================
# DOCKER COMPOSE - MONGODB SHARDED CLUSTER
# =====================================================
# Stack:
# - Config Servers (configRS)
# - Shardes: everesRS / fansipRS / fujimoRS
# - Router: mongos-router-dn / mongos-router-hn / mongos-router-sg
# - UI: mongos-expres-io
# =====================================================

networks:
  nest-cluster:
    external: true

services:
  keygen:
    container_name: ${APP_NAME}_keygen
    image: mongo:7
    volumes:
      - ./keyfile:/keyfile
      - ./keygen:/keygen
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["bash", "/keygen/create-keyfile.sh"]
    networks:
      - nest-cluster

  mongos-router-dn:
    container_name: ${APP_NAME}_mongos-router-dn
    image: mongo:7
    volumes:
      - ./keyfile:/etc
      - ./mongo/cluster.js:/mongo/cluster.js:ro
      - ./init/init-config-server.js:/init/init-config-server.js:ro
      - ./init/init-sharde-everes.js:/init/init-sharde-everes.js:ro
      - ./init/init-sharde-fansip.js:/init/init-sharde-fansip.js:ro
      - ./init/init-sharde-fujimo.js:/init/init-sharde-fujimo.js:ro
      - ./pitfall:/pitfall
      # - ./data/config-sv/config-sv-primary:/data/db
    env_file: .env
    networks:
      - nest-cluster
    command: |
      bash -c "
        set -e

        while [ ! -f /etc/mongo-keyfile ]; do
          echo 'WAITING FOR KEYFILE...'
          sleep 2
        done

        mkdir -p /data/config-server
        mkdir -p /data/sharde-everes
        mkdir -p /data/sharde-fansip
        mkdir -p /data/sharde-fujimo

        mongod --replSet configRS --bind_ip_all --configsvr --port 27018 --dbpath /data/config-server --fork --logpath /tmp/config-server.log
        mongod --replSet everesRS --bind_ip_all --shardsvr --port 27019 --dbpath /data/sharde-everes --fork --logpath /tmp/sharde-everes.log
        mongod --replSet fansipRS --bind_ip_all --shardsvr --port 27020 --dbpath /data/sharde-fansip --fork --logpath /tmp/sharde-fansip.log
        mongod --replSet fujimoRS --bind_ip_all --shardsvr --port 27021 --dbpath /data/sharde-fujimo --fork --logpath /tmp/sharde-fujimo.log

        echo 'WAITING FOR config-server-dn'
        until mongosh --quiet --host mongos-router-dn:27018 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'config-server-dn READY'

        echo 'WAITING FOR sharde-everes-dn'
        until mongosh --quiet --host mongos-router-dn:27019 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-everes-dn READY'

        echo 'WAITING FOR sharde-fansip-dn'
        until mongosh --quiet --host mongos-router-dn:27020 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fansip-dn READY'

        echo 'WAITING FOR sharde-fujimo-dn'
        until mongosh --quiet --host mongos-router-dn:27021 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fujimo-dn READY'

        echo 'WAITING FOR config-server-hn'
        until mongosh --quiet --host mongos-router-hn:27018 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'config-server-hn READY'

        echo 'WAITING FOR sharde-everes-hn'
        until mongosh --quiet --host mongos-router-hn:27019 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-everes-hn READY'

        echo 'WAITING FOR sharde-fansip-hn'
        until mongosh --quiet --host mongos-router-hn:27020 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fansip-hn READY'

        echo 'WAITING FOR sharde-fujimo-hn'
        until mongosh --quiet --host mongos-router-hn:27021 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fujimo-hn READY'

        echo 'WAITING FOR config-server-sg'
        until mongosh --quiet --host mongos-router-sg:27018 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'config-server-sg READY'

        echo 'WAITING FOR sharde-everes-sg'
        until mongosh --quiet --host mongos-router-sg:27019 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-everes-sg READY'

        echo 'WAITING FOR sharde-fansip-sg'
        until mongosh --quiet --host mongos-router-sg:27020 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fansip-sg READY'

        echo 'WAITING FOR sharde-fujimo-sg'
        until mongosh --quiet --host mongos-router-sg:27021 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fujimo-sg READY'

        mongosh --host mongos-router-dn:27018 /init/init-config-server.js
        mongosh --host mongos-router-dn:27019 /init/init-sharde-everes.js
        mongosh --host mongos-router-dn:27020 /init/init-sharde-fansip.js
        mongosh --host mongos-router-dn:27021 /init/init-sharde-fujimo.js

        mongod --shutdown --dbpath /data/config-server
        mongod --shutdown --dbpath /data/sharde-everes
        mongod --shutdown --dbpath /data/sharde-fansip
        mongod --shutdown --dbpath /data/sharde-fujimo

        echo 'WAITING FOR ALL MONGOD TO STOP...'
        while pidof mongod > /dev/null; do
          sleep 2
        done
        echo 'ALL MONGOD STOPPED'

        echo 'WAITING FOR ALL MONGOD TO START...'
        mongod --replSet configRS --bind_ip_all --configsvr --port 27018 --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --dbpath /data/config-server --fork --logpath /tmp/config-server.log
        touch /pitfall/restart-config-server-done
        mongod --replSet everesRS --bind_ip_all --shardsvr --port 27019 --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --dbpath /data/sharde-everes --fork --logpath /tmp/sharde-everes.log
        touch /pitfall/restart-sharde-everes-done
        mongod --replSet fansipRS --bind_ip_all --shardsvr --port 27020 --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --dbpath /data/sharde-fansip --fork --logpath /tmp/sharde-fansip.log
        touch /pitfall/restart-sharde-fansip-done
        mongod --replSet fujimoRS --bind_ip_all --shardsvr --port 27021 --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --dbpath /data/sharde-fujimo --fork --logpath /tmp/sharde-fujimo.log
        touch /pitfall/restart-sharde-fujimo-done

        echo 'ALL MONGOD TO STARTED'

        echo 'WAITING FOR config-server-dn'
        until mongosh --quiet --host mongos-router-dn:27018 -u ${MONGO_ADMIN_CONFIG_SERVER} -p ${MONGO_PASSWORD_CONFIG_SERVER} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'config-server-dn READY'

        echo 'WAITING FOR sharde-everes-dn'
        until mongosh --quiet --host mongos-router-dn:27019 -u ${MONGO_ADMIN_SHARDE_EVERES} -p ${MONGO_PASSWORD_SHARDE_EVERES} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-everes-dn READY'

        echo 'WAITING FOR sharde-fansip-dn'
        until mongosh --quiet --host mongos-router-dn:27020 -u ${MONGO_ADMIN_SHARDE_FANSIP} -p ${MONGO_PASSWORD_SHARDE_FANSIP} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fansip-dn READY'

        echo 'WAITING FOR sharde-fujimo-dn'
        until mongosh --quiet --host mongos-router-dn:27021 -u ${MONGO_ADMIN_SHARDE_FUJIMO} -p ${MONGO_PASSWORD_SHARDE_FUJIMO} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fujimo-dn READY'

        echo 'WAITING FOR config-server-hn'
        until mongosh --quiet --host mongos-router-hn:27018 -u ${MONGO_ADMIN_CONFIG_SERVER} -p ${MONGO_PASSWORD_CONFIG_SERVER} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'config-server-hn READY'

        echo 'WAITING FOR sharde-everes-hn'
        until mongosh --quiet --host mongos-router-hn:27019 -u ${MONGO_ADMIN_SHARDE_EVERES} -p ${MONGO_PASSWORD_SHARDE_EVERES} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-everes-hn READY'

        echo 'WAITING FOR sharde-fansip-hn'
        until mongosh --quiet --host mongos-router-hn:27020 -u ${MONGO_ADMIN_SHARDE_FANSIP} -p ${MONGO_PASSWORD_SHARDE_FANSIP} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fansip-hn READY'

        echo 'WAITING FOR sharde-fujimo-hn'
        until mongosh --quiet --host mongos-router-hn:27021 -u ${MONGO_ADMIN_SHARDE_FUJIMO} -p ${MONGO_PASSWORD_SHARDE_FUJIMO} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fujimo-hn READY'

        echo 'WAITING FOR config-server-sg'
        until mongosh --quiet --host mongos-router-sg:27018 -u ${MONGO_ADMIN_CONFIG_SERVER} -p ${MONGO_PASSWORD_CONFIG_SERVER} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'config-server-sg READY'

        echo 'WAITING FOR sharde-everes-sg'
        until mongosh --quiet --host mongos-router-sg:27019 -u ${MONGO_ADMIN_SHARDE_EVERES} -p ${MONGO_PASSWORD_SHARDE_EVERES} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-everes-sg READY'

        echo 'WAITING FOR sharde-fansip-sg'
        until mongosh --quiet --host mongos-router-sg:27020 -u ${MONGO_ADMIN_SHARDE_FANSIP} -p ${MONGO_PASSWORD_SHARDE_FANSIP} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fansip-sg READY'

        echo 'WAITING FOR sharde-fujimo-sg'
        until mongosh --quiet --host mongos-router-sg:27021 -u ${MONGO_ADMIN_SHARDE_FUJIMO} -p ${MONGO_PASSWORD_SHARDE_FUJIMO} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do
          sleep 2
        done
        echo 'sharde-fujimo-sg READY'

        mongos --configdb configRS/mongos-router-dn:27018,mongos-router-hn:27018,mongos-router-sg:27018 --bind_ip_all --keyFile /etc/mongo-keyfile --fork --logpath /tmp/mongos.log

        until mongosh --quiet --host mongos-router-dn --port 27017 -u ${MONGO_ADMIN_CONFIG_SERVER} -p ${MONGO_PASSWORD_CONFIG_SERVER} --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1 > /dev/null; do
          sleep 2
        done

        mongosh --host mongos-router-dn --port 27017 -u ${MONGO_ADMIN_CONFIG_SERVER} -p ${MONGO_PASSWORD_CONFIG_SERVER} --authenticationDatabase admin /mongo/cluster.js && tail -f /tmp/mongos.log
      "

