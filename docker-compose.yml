    ports:
      - ${MONGOS_EXPRES_IO_PORT}:${PORT_OF_EXPRES}
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ADMINIST_SHARDE_MATTER}:${MONGO_PASSWORD_SHARDE_MATTER}@${MONGOS_ROUTER_DN_ADRS}:${PORT_OF_MONGOS},${MONGOS_ROUTER_HN_ADRS}:${PORT_OF_MONGOS},${MONGOS_ROUTER_SG_ADRS}:${PORT_OF_MONGOS}/admin?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${EXPRESS_ADMINIST}
      ME_CONFIG_BASICAUTH_PASSWORD: ${EXPRESS_PASSWORD}
      PORT: ${PORT_OF_EXPRES}
    command: |
      bash -c "
      echo 'Waiting for mongos startup...'

      until nc -z \"$${MONGOS_ROUTER_DN_ADRS}\" \"$${PORT_OF_MONGOS}\"; do sleep 2; done
      until nc -z \"$${MONGOS_ROUTER_HN_ADRS}\" \"$${PORT_OF_MONGOS}\"; do sleep 2; done
