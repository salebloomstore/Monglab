# =====================================================
# DOCKER COMPOSE - MONGODB SHARDED CLUSTER
# =====================================================
# Components:
# - Config Server Replica Set: matterRS
# - Shard Replica Sets: everesRS / fansipRS / fujimoRS
# - Mongos Routers: mongos-router-dn / mongos-router-hn / mongos-router-sg
# - Mongo Express UI: mongos-expres-io
# =====================================================

name: mongos-master

x-mongo-image: &mongo-image mongo:7.0.14@sha256:0032d2ca20db5fa34926f196c8a43b74e34ed239a7f2453ff1505b6f12ba8ea6
x-mongo-express-image: &mongo-express-image mongo-express:1.0.2@sha256:1b23d7976f0210dbec74045c209e52fbb26d29b2e873d6c6fa3d3f0ae32c2a64

networks:
  master-netwrk:
    external: true

services:
  # =====================================================
  # KEYFILE GENERATOR (used for MongoDB auth replication)
  # =====================================================
  keygen:
    container_name: ${APP_NAME}_keygen-suicid-cr
    image: *mongo-image
    volumes:
      - ./keyfile:/keyfile
      - ./keygen:/keygen
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["bash", "/keygen/create-keyfile.sh"]
    networks:
      - master-netwrk

  # =====================================================
  # SHARDE MATTER DN (Primary bootstrap node for cluster init)
  # =====================================================
  sharde-matter-dn:
    container_name: ${APP_NAME}_sharde-matter-dn
    image: *mongo-image
    volumes:
      - ./keyfile:/etc
      - sharde-matter-dn:/data
      - ./init/init-sharde-matter.js:/init/init-sharde-matter.js:ro
      - ./pitfall:/pitfall
    env_file: .env
    ports:
      - ${SHARDE_MATTER_DN_PORT}:27017
    networks:
      - master-netwrk
    command: |
      bash -c "
        set -e

        echo 'WAITING FOR KEYFILE...'
        while [ ! -f /etc/mongo-keyfile ]; do sleep 2; done
        echo 'KEYFILE CREATED'

        mkdir -p /data/sharde-matter-dn

        echo 'STARTING UP NODE IN PROGRESS WITH NO AUTH'
        mongod --replSet matterRS --bind_ip_all --port 27017 --dbpath /data/sharde-matter-dn --fork --logpath /tmp/mongod.log --configsvr
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH NO AUTH'

        echo 'WAITING FOR SHARDE-MATTER-HN'
        until mongosh --quiet --host sharde-matter-hn:27017 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do sleep 2; done
        echo 'SHARDE-MATTER-HN READY'

        echo 'WAITING FOR SHARDE-MATTER-SG'
        until mongosh --quiet --host sharde-matter-sg:27017 --eval 'db.adminCommand({ ping: 1 })' > /dev/null 2>&1; do sleep 2; done
        echo 'SHARDE-MATTER-SG READY'

        echo 'WAITING SHARDE-MATTER-DN FOR INIT'
        mongosh --host sharde-matter-dn:27017 /init/init-sharde-matter.js
        echo 'SHARDE-MATTER-DN INIT DONE'

        echo 'WAITING FOR STARTING UP NODE IN PROGRESS WITH AUTH'
        mongod --shutdown --dbpath /data/sharde-matter-dn
        while pidof mongod >/dev/null 2>&1; do sleep 2; done
        mongod --replSet matterRS --bind_ip_all --port 27017 --dbpath /data/sharde-matter-dn --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --fork --logpath /tmp/mongod.log --configsvr
        touch /pitfall/restart-sharde-matter-dn-done
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH AUTH'
      "

  # =====================================================
  # SHARDE MATTER HN (Replica set member)
  # =====================================================
  sharde-matter-hn:
    container_name: ${APP_NAME}_sharde-matter-hn
    image: *mongo-image
    volumes:
      - ./keyfile:/etc
      - sharde-matter-hn:/data
      - ./pitfall:/pitfall
    env_file: .env
    ports:
      - ${SHARDE_MATTER_HN_PORT}:27017
    networks:
      - master-netwrk
    command: |
      bash -c "
        set -e

        echo 'WAITING FOR KEYFILE...'
        while [ ! -f /etc/mongo-keyfile ]; do sleep 2; done
        echo 'KEYFILE CREATED'

        mkdir -p /data/sharde-matter-hn

        echo 'STARTING UP NODE IN PROGRESS WITH NO AUTH'
        mongod --replSet matterRS --bind_ip_all --port 27017 --dbpath /data/sharde-matter-hn --fork --logpath /tmp/mongod.log --configsvr
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH NO AUTH'

        echo 'WAITING FOR STARTING UP SHARDE-MATTER-DN IN PROGRESS WITH AUTH'
        while [ ! -f /pitfall/restart-sharde-matter-dn-done ]; do sleep 2; done
        echo 'THE SHARDE-MATTER-DN HAVE FINISHED BOOTING UP WITH AUTH'

        echo 'WAITING FOR STARTING UP NODE IN PROGRESS WITH AUTH'
        mongod --shutdown --dbpath /data/sharde-matter-hn
        while pidof mongod >/dev/null 2>&1; do sleep 2; done
        mongod --replSet matterRS --bind_ip_all --port 27017 --dbpath /data/sharde-matter-hn --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --fork --logpath /tmp/mongod.log --configsvr
        touch /pitfall/restart-sharde-matter-hn-done
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH AUTH'
      "

  # =====================================================
  # SHARDE MATTER SG (Replica set member)
  # =====================================================
  sharde-matter-sg:
    container_name: ${APP_NAME}_sharde-matter-sg
    image: *mongo-image
    volumes:
      - ./keyfile:/etc
      - sharde-matter-sg:/data
      - ./pitfall:/pitfall
    env_file: .env
    ports:
      - ${SHARDE_MATTER_SG_PORT}:27017
    networks:
      - master-netwrk
    command: |
      bash -c "
        set -e

        echo 'WAITING FOR KEYFILE...'
        while [ ! -f /etc/mongo-keyfile ]; do sleep 2; done
        echo 'KEYFILE CREATED'

        mkdir -p /data/sharde-matter-sg

        echo 'STARTING UP NODE IN PROGRESS WITH NO AUTH'
        mongod --replSet matterRS --bind_ip_all --port 27017 --dbpath /data/sharde-matter-sg --fork --logpath /tmp/mongod.log --configsvr
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH NO AUTH'

        echo 'WAITING FOR STARTING UP SHARDE-MATTER-HN IN PROGRESS WITH AUTH'
        while [ ! -f /pitfall/restart-sharde-matter-hn-done ]; do sleep 2; done
        echo 'THE SHARDE-MATTER-HN HAVE FINISHED BOOTING UP WITH AUTH'
        rm -f /pitfall/restart-sharde-matter-dn-done
        rm -f /pitfall/restart-sharde-matter-hn-done

        echo 'WAITING FOR STARTING UP NODE IN PROGRESS WITH AUTH'
        mongod --shutdown --dbpath /data/sharde-matter-sg
        while pidof mongod >/dev/null 2>&1; do sleep 2; done
        mongod --replSet matterRS --bind_ip_all --port 27017 --dbpath /data/sharde-matter-sg --auth --keyFile /etc/mongo-keyfile --setParameter enableLocalhostAuthBypass=0 --fork --logpath /tmp/mongod.log --configsvr
        touch /pitfall/restart-sharde-matter-sg-done
        echo 'THE NODE HAVE FINISHED BOOTING UP WITH AUTH'
      "

volumes:
  sharde-matter-dn:
  sharde-matter-hn:
  sharde-matter-sg:
