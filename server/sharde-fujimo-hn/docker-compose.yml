name: wizard-sharde-fujimo-hn

networks:
  master-netwrk:
    external: true

services:
  wizard-sharde-fujimo-hn:
    container_name: ${APP_NAME}_sharde-fujimo-hn
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./keyfile:/etc
      - wizard-sharde-fujimo-hn-da:/data/db
      - wizard-sharde-fujimo-hn-cf:/data/configdb
    env_file: ../../.env
    ports:
      - ${SHARDE_FUJIMO_HN_PORT}:${SHARDE_FUJIMO_HN_PORT_OF}
    networks:
      - master-netwrk

volumes:
  wizard-sharde-fujimo-hn-da:
  wizard-sharde-fujimo-hn-cf:
