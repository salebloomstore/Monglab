name: sharde-matter-dn

networks:
  master-netwrk:
    external: true

services:
  sharde-matter-dn:
    container_name: ${APP_NAME}_sharde-matter-dn
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./keyfile:/etc
      - sharde-matter-dn-da:/data/db
      - sharde-matter-dn-cf:/data/configdb
      - ./init/init-sharde-matter.js:/init/init-sharde-matter.js:ro
    env_file: ../../.env
    ports:
      - ${SHARDE_MATTER_DN_PORT}:${SHARDE_MATTER_DN_PORT_OF}
    networks:
      - master-netwrk

volumes:
  sharde-matter-dn-da:
  sharde-matter-dn-cf:
