name: wizard-sharde-everes-dn

networks:
  master-netwrk:
    external: true

services:
  wizard-sharde-everes-dn:
    container_name: ${APP_NAME}_sharde-everes-dn
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./keyfile:/etc
      - wizard-sharde-everes-dn-da:/data/db
      - wizard-sharde-everes-dn-cf:/data/configdb
      - ./init/init-sharde-everes.js:/init/init-sharde-everes.js:ro
    env_file: ../../.env
    ports:
      - ${SHARDE_EVERES_DN_PORT}:${SHARDE_EVERES_DN_PORT_OF}
    networks:
      - master-netwrk

volumes:
  wizard-sharde-everes-dn-da:
  wizard-sharde-everes-dn-cf:
