name: mongos-router-sg

x-mongo-image: &mongo-image mongo:7.0.14@sha256:0032d2ca20db5fa34926f196c8a43b74e34ed239a7f2453ff1505b6f12ba8ea6

networks:
  master-netwrk:
    external: true

services:
  mongos-router-sg:
    container_name: ${APP_NAME}_mongos-router-sg
    image: *mongo-image
    volumes:
      - ./keyfile:/etc
      - mongos-router-sg-da:/data/db
      - mongos-router-sg-cf:/data/configdb
    env_file: ../../.env
    ports:
      - ${MONGOS_ROUTER_SG_PORT}:${MONGOS_ROUTER_SG_PORT_OF}
    networks:
      - master-netwrk

volumes:
  mongos-router-sg-da:
  mongos-router-sg-cf:
